<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Results | Network Security</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .header-container {
            background-color: #2c3e50;
            color: white;
            padding: 25px 0;
            margin-bottom: 40px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .table-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 50px;
        }
        /* Custom Styling for the Pandas-generated table */
        table th {
            background-color: #34495e !important;
            color: white !important;
            text-align: center;
        }
        table td {
            vertical-align: middle;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header-container text-center">
        <h2>Network Security: Phishing Data Predictions</h2>
        <p class="mb-0">Automated Threat Detection System Output</p>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 table-container">
                <h4 class="mb-4 text-secondary border-bottom pb-2">Batch Prediction Results</h4>
                
                <div class="table-responsive">
                    {{ table | safe }}
                </div>
                
                <div class="mt-4 text-center">
                    <a href="/docs" class="btn btn-primary px-4 me-2">Test Another File (API Docs)</a>
                    <a href="/" class="btn btn-outline-secondary px-4">Home</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
